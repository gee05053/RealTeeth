<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d7ec8"/>
      <stop offset="100%" stop-color="#6aaad8"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f5c040"/>
      <stop offset="100%" stop-color="#e89a10"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e8eef6"/>
      <stop offset="100%" stop-color="#d0dcea"/>
    </linearGradient>
  </defs>

  <!-- Sky background (rounded square) -->
  <rect width="48" height="48" rx="10" fill="url(#skyGrad)"/>

  <!-- Sun rays -->
  <line x1="16" y1="4"   x2="16" y2="9"   stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="23"  x2="16" y2="28"  stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2"  y1="16"  x2="7"  y2="16"  stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="25" y1="16"  x2="30" y2="16"  stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="5.5"  y1="5.5"  x2="9"    y2="9"    stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23"   y1="23"   x2="26.5"  y2="26.5" stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26.5" y1="5.5"  x2="23"    y2="9"    stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="9"    y1="23"   x2="5.5"   y2="26.5" stroke="#e8a820" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sun circle -->
  <circle cx="16" cy="16" r="7.5" fill="url(#sunGrad)"/>

  <!-- Cloud -->
  <path d="
    M 15 43
    C 11.5 43 8.5 40.2 8.5 36.8
    C 8.5 34 10.5 31.5 13.2 30.7
    C 13.7 27.4 16.5 25 19.8 25
    C 23.1 25 25.9 27.4 26.4 30.7
    C 27.8 30.2 29.3 30.2 30.7 30.8
    C 33 31.8 34.5 34.1 34.5 36.6
    C 34.5 40.1 31.7 43 28.2 43
    Z"
    fill="url(#cloudGrad)"
  />
</svg>
